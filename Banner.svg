<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">

<style>
.wave{
fill:none;
stroke-width:4;
stroke-linecap:round;
stroke-dasharray:10 6;
animation: move 4s linear infinite;
}

.blue{
stroke:#00aaff;
}

.red{
stroke:#ff3b3b;
animation-delay:-2s;
}

@keyframes move{
from{stroke-dashoffset:0;}
to{stroke-dashoffset:-160;}
}
</style>

<!-- Blue Electric Field -->
<path class="wave blue"
d="
M0 100
Q50 70 100 100
T200 100
T300 100
T400 100
T500 100
T600 100
T700 100
T800 100
"/>

<!-- Red Magnetic Field -->
<path class="wave red"
d="
M0 100
Q50 130 100 100
T200 100
T300 100
T400 100
T500 100
T600 100
T700 100
T800 100
"/>

</svg>
